name: human_rhythms
description: Track your daily routines and discover what truly works for you.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  hooks_riverpod: ^2.5.1
  flutter_hooks: ^0.20.5

  # Navigation
  go_router: ^14.2.0

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.3
  cloud_firestore: ^5.4.4
  firebase_analytics: ^11.3.3
  firebase_remote_config: ^5.1.3

  # Auth
  google_sign_in: ^6.2.1

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.0
  collection: ^1.18.0
  cupertino_icons: ^1.0.8
  permission_handler: ^11.0.0
  shared_preferences: ^2.3.0

  # Notifications (Task 4)
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.4

  # Voice input (Task 5)
  speech_to_text: ^7.0.0

  # HTTP for AI assistant (Task 5)
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
